<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OliLab - Science Laboratory Management</title>
    <!-- Link to the compiled Tailwind CSS file -->
    <link href="/dist/output.css" rel="stylesheet" />
    <!-- Favicon -->
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%2310b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 22 17 7"/><path d="M22 2 7 17"/><path d="M15 9a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M9 15a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>'>
    
    <!-- ES Module Shims: Import maps polyfill for browsers -->
    <script src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "react-router-dom": "https://esm.sh/react-router-dom@6.24.0",
    "recharts": "https://esm.sh/recharts@2.12.7",
    "@google/genai": "https://esm.sh/@google/generative-ai@0.14.1",
    "html5-qrcode": "https://esm.sh/html5-qrcode@2.3.8",
    "qrcode": "https://esm.sh/qrcode@1.5.3",
    "sucrase/dist/index": "https://esm.sh/sucrase@3.35.0/dist/index.js",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react/": "https://aistudiocdn.com/react@^19.1.1/"
  }
}
</script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- This div is a print-only area for QR codes -->
    <div id="qr-print-area"></div>
    <script type="module-shim">
      import { registerTransforms } from 'https://esm.sh/sucrase@3.35.0/dist/index.js';
      registerTransforms(['tsx']);

      // A simple fetch-based loader for Sucrase
      window.fetch_and_transform = async (url) => {
        const res = await fetch(url);
        const text = await res.text();
        const { transform } = await import('sucrase/dist/index');
        const result = transform(text, {
          transforms: ["typescript", "jsx"],
          jsxPragma: "React.createElement",
          jsxFragmentPragma: "React.Fragment",
        });
        return {
          code: result.code,
          map: result.sourceMap,
        };
      };
    </script>
    <script type="module-shim" src="./index.tsx"></script>
    
    <!-- CSS for printing -->
    <style type="text/css" media="print">
      @page {
        size: auto;
        margin: 0;
      }
      body.printing-qr .sidebar-print-hide,
      body.printing-qr .main-content-print,
      body.printing-qr .button-print-hide {
        display: none !important;
      }
      body.printing-qr #qr-print-area {
        display: block !important;
      }
      #qr-print-area {
        display: none;
      }
      .print-bg-white {
         background-color: white !important;
      }
      .print-text-black {
          color: black !important;
      }
    </style>
  </body>
</html>
